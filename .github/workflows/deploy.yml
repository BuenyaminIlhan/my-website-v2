name: Deploy to IONOS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy via SFTP
        env:
          DEPLOY_SERVER: ${{ secrets.FTP_SERVER }}
          DEPLOY_USER: ${{ secrets.FTP_USERNAME }}
          DEPLOY_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          lftp -u "$DEPLOY_USER","$DEPLOY_PASS" "sftp://$DEPLOY_SERVER" -e "set sftp:auto-confirm yes; set net:max-retries 3; mirror --reverse --parallel=5 dist/my-website-v2/browser/ /; quit"
