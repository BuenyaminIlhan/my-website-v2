name: Deploy to IONOS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy via SFTP
        run: |
          sudo apt-get install -y lftp
          lftp -c "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open sftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }};
            mirror --reverse --parallel=5 --delete --verbose dist/my-website-v2/browser/ /;
          "
