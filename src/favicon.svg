<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @font-face {
      font-family: 'Syne';
      font-weight: 700;
      src: url(data:font/ttf;charset=utf-8;base64,) format('truetype');
    }
  </style>

  <!-- Background -->
  <rect width="32" height="32" fill="#1a1a1a"/>

  <!-- [ left bracket -->
  <rect x="2"   y="2.5" width="2.5" height="27" fill="#ff9900"/>
  <rect x="2"   y="2.5" width="6.5" height="2.5" fill="#ff9900"/>
  <rect x="2"   y="27"  width="6.5" height="2.5" fill="#ff9900"/>

  <!-- ] right bracket -->
  <rect x="27.5" y="2.5" width="2.5" height="27" fill="#ff9900"/>
  <rect x="23.5" y="2.5" width="6.5" height="2.5" fill="#ff9900"/>
  <rect x="23.5" y="27"  width="6.5" height="2.5" fill="#ff9900"/>

  <!-- BI centred in the inner space (x 8.5 to 23.5 → centre = 16) -->
  <text x="16" y="23"
    font-family="Syne, 'Arial Black', sans-serif"
    font-weight="700"
    font-size="14"
    text-anchor="middle">
    <tspan fill="#f0ede4">B</tspan><tspan fill="#ff9900">I</tspan>
  </text>
</svg>
