<section id="about" class="about section-padding">
  <div class="about-grid">
    <div class="about-text">
      <div class="section-label">
        <span class="label-line"></span>
        <span>{{ lang.t().about.label }}</span>
      </div>
      <h2 class="section-title">{{ lang.t().about.title1 }}<br /><span class="accent">{{ lang.t().about.title2 }}</span></h2>

      <p>{{ lang.t().about.p1 }}</p>
      <p>{{ lang.t().about.p2 }}</p>
      <p>{{ lang.t().about.p3 }}</p>
      <p>{{ lang.t().about.p4 }}</p>

      <a href="#contact" class="btn-primary">{{ lang.t().about.cta }}</a>
    </div>

    <div class="about-visual">
      <div class="img-frame">
        <img src="assets/img/Profile_2.jpg" alt="Bünyamin Ilhan" />
        <div class="img-accent"></div>
      </div>
    </div>
  </div>
</section>
